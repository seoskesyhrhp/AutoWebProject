<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastAPI 路由浏览器</title>
    <link rel="stylesheet" href="/static/ehs/css/all.min.css" />
    <script src="/static/ehs/js/htmx.min.js"></script>
    <!-- <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
        <script src="https://unpkg.com/htmx.org@1.9.10"></script> -->
    <style>
      :root {
        --primary: #4361ee;
        --secondary: #3f37c9;
        --success: #4cc9f0;
        --dark: #1d3557;
        --light: #f8f9fa;
        --gray: #6c757d;
        --border-radius: 8px;
        --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        --transition: all 0.3s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #333;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
        color: white;
      }

      .header h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      }

      .header p {
        font-size: 1.1rem;
        opacity: 0.9;
      }

      .card {
        background: white;
        border-radius: var(--border-radius);
        box-shadow: var(--box-shadow);
        overflow: hidden;
        margin-bottom: 20px;
        transition: var(--transition);
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      }

      .card-header {
        background: var(--primary);
        color: white;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .card-body {
        padding: 20px;
      }

      .route-path {
        font-family: "Courier New", monospace;
        font-weight: bold;
        font-size: 1.1rem;
      }

      .method-badge {
        background: var(--success);
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
      }

      .route-summary {
        font-weight: bold;
        margin: 10px 0;
        color: var(--dark);
      }

      .route-description {
        color: var(--gray);
        margin-bottom: 15px;
      }

      .parameters-section {
        margin: 15px 0;
      }

      .parameters-title {
        font-weight: bold;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
      }

      .parameters-title i {
        margin-right: 8px;
      }

      .parameter-item {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
        padding: 8px;
        background: #f8f9fa;
        border-radius: 4px;
      }

      .param-name {
        font-weight: bold;
        min-width: 100px;
      }

      .param-type {
        background: #e9ecef;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.8rem;
        margin: 0 10px;
      }

      .param-required {
        color: #e63946;
        font-size: 0.8rem;
        margin-left: auto;
      }

      .param-optional {
        color: var(--gray);
        font-size: 0.8rem;
        margin-left: auto;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      .btn {
        padding: 8px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
      }

      .btn i {
        margin-right: 5px;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background: var(--secondary);
      }

      .btn-outline {
        background: transparent;
        border: 1px solid var(--primary);
        color: var(--primary);
      }

      .btn-outline:hover {
        background: var(--primary);
        color: white;
      }

      .test-section {
        margin-top: 15px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 4px;
        display: none;
      }

      .input-group {
        margin-bottom: 10px;
      }

      .input-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }

      .input-group input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }

      .result-area {
        margin-top: 15px;
        padding: 10px;
        background: white;
        border-radius: 4px;
        border: 1px solid #ddd;
        max-height: 300px;
        overflow-y: auto;
      }

      .loading {
        text-align: center;
        padding: 30px;
        color: var(--gray);
      }

      .loading i {
        font-size: 2rem;
        margin-bottom: 10px;
      }

      .stats {
        display: flex;
        justify-content: space-between;
        background: white;
        padding: 15px 20px;
        border-radius: var(--border-radius);
        box-shadow: var(--box-shadow);
        margin-bottom: 20px;
      }

      .stat-item {
        text-align: center;
        flex: 1;
      }

      .stat-value {
        font-size: 2rem;
        font-weight: bold;
        color: var(--primary);
      }

      .stat-label {
        color: var(--gray);
        font-size: 0.9rem;
      }

      .filter-section {
        background: white;
        padding: 15px 20px;
        border-radius: var(--border-radius);
        box-shadow: var(--box-shadow);
        margin-bottom: 20px;
      }

      .search-input {
        width: 100%;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 1rem;
      }

      @media (max-width: 768px) {
        .stats {
          flex-direction: column;
          gap: 15px;
        }

        .actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1><i class="fas fa-route"></i> FastAPI 路由浏览器</h1>
        <p>探索和测试您的所有API端点</p>
      </div>

      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="total-routes">0</div>
          <div class="stat-label">总路由数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="get-routes">0</div>
          <div class="stat-label">GET 路由</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="post-routes">0</div>
          <div class="stat-label">POST 路由</div>
        </div>
      </div>

      <div class="filter-section">
        <input type="text" class="search-input" id="search-input" placeholder="搜索路由路径或描述..." />
      </div>

      <div id="routes-container">
        <div class="loading">
          <i class="fas fa-spinner fa-spin"></i>
          <p>正在加载路由信息...</p>
        </div>
      </div>
    </div>

    <script>
      // 转义CSS选择器中的特殊字符
      function escapeCssSelector(selector) {
        return selector.replace(/[!"#$%&'()*+,\-.\/:;<=>?@[\\\]^`{|}~]/g, "\\$&");
      }

      // 生成安全的ID
      function safeId(path) {
        return path.replace(/[^a-zA-Z0-9]/g, "_");
      }

      // 加载路由数据
      document.addEventListener("DOMContentLoaded", function () {
        fetch("/explorer/routes")
          .then((response) => response.json())
          .then((data) => {
            displayRoutes(data.routes);
            document.getElementById("total-routes").textContent = data.total_routes;
            document.getElementById("get-routes").textContent = data.total_routes;
          })
          .catch((error) => {
            console.error("加载路由数据失败:", error);
            document.getElementById("routes-container").innerHTML = '<div class="card"><div class="card-body">加载路由数据失败，请刷新页面重试。</div></div>';
          });
      });

      // 显示路由列表
      function displayRoutes(routes) {
        const container = document.getElementById("routes-container");

        if (routes.length === 0) {
          container.innerHTML = '<div class="card"><div class="card-body">未找到任何路由。</div></div>';
          return;
        }

        let html = "";

        routes.forEach((route) => {
          const routeId = safeId(route.path);
          let paramsHtml = "";

          if (route.parameters && route.parameters.length > 0) {
            paramsHtml = `
                            <div class="parameters-section">
                                <div class="parameters-title">
                                    <i class="fas fa-list"></i> 参数
                                </div>
                        `;

            route.parameters.forEach((param) => {
              const requiredText = param.required ? '<span class="param-required">必填</span>' : '<span class="param-optional">可选</span>';
              paramsHtml += `
                                <div class="parameter-item">
                                    <span class="param-name">${param.name}</span>
                                    <span class="param-type">${param.type}</span>
                                    <span>(${param.in})</span>
                                    ${requiredText}
                                </div>
                            `;
            });

            paramsHtml += "</div>";
          }

          // 构建直接访问的URL（处理路径参数）
          let directUrl = route.path;
          if (route.parameters) {
            const pathParams = route.parameters.filter((p) => p.in === "path");
            if (pathParams.length > 0) {
              // 如果有路径参数，用示例值替换
              pathParams.forEach((param) => {
                // 根据参数类型提供不同的示例值
                let exampleValue = "123";
                if (param.type.includes("string") || param.type === "str") {
                  exampleValue = "example";
                }
                directUrl = directUrl.replace(`{${param.name}}`, exampleValue);
              });
            }
          }

          html += `
                        <div class="card route-item" data-path="${route.path}" data-summary="${route.summary}" data-description="${route.description}">
                            <div class="card-header">
                                <div class="route-path">${route.path}</div>
                                <div class="method-badge">GET</div>
                            </div>
                            <div class="card-body">
                                <div class="route-summary">${route.summary}</div>
                                <div class="route-description">${route.description}</div>
                                ${paramsHtml}
                                <div class="actions">
                                    <a href="${directUrl}" target="_blank" class="btn btn-primary">
                                        <i class="fas fa-external-link-alt"></i> 直接访问
                                    </a>
                                    <button class="btn btn-outline" onclick="toggleTestSection('${routeId}')">
                                        <i class="fas fa-vial"></i> 测试端点
                                    </button>
                                </div>
                                <div class="test-section" id="test-${routeId}">
                                    <div class="input-group">
                                        <label>请求 URL:</label>
                                        <input type="text" id="url-${routeId}" value="${route.path}" readonly>
                                    </div>
                                    ${
                                      route.parameters && route.parameters.length > 0
                                        ? `
                                        <div class="parameters-title">
                                            <i class="fas fa-edit"></i> 设置参数值
                                        </div>
                                    `
                                        : ""
                                    }
                                    ${generateParameterInputs(route, routeId)}
                                    <button class="btn btn-primary" onclick="testRoute('${routeId}', '${route.path}')">
                                        <i class="fas fa-play"></i> 发送请求
                                    </button>
                                    <div class="result-area" id="result-${routeId}">
                                        <p>点击"发送请求"查看结果</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
        });

        container.innerHTML = html;

        // 添加搜索功能
        document.getElementById("search-input").addEventListener("input", function (e) {
          const searchTerm = e.target.value.toLowerCase();
          const routeItems = document.querySelectorAll(".route-item");

          routeItems.forEach((item) => {
            const path = item.getAttribute("data-path").toLowerCase();
            const summary = item.getAttribute("data-summary").toLowerCase();
            const description = item.getAttribute("data-description").toLowerCase();

            if (path.includes(searchTerm) || summary.includes(searchTerm) || description.includes(searchTerm)) {
              item.style.display = "block";
            } else {
              item.style.display = "none";
            }
          });
        });
      }

      // 生成参数输入框
      function generateParameterInputs(route, routeId) {
        if (!route.parameters || route.parameters.length === 0) {
          return "";
        }

        let inputsHtml = "";

        route.parameters.forEach((param) => {
          let inputType = "text";
          let placeholder = param.type;

          if (param.type === "int" || param.type === "integer") {
            inputType = "number";
            placeholder = "数字，如: 123";
          } else if (param.type === "bool" || param.type === "boolean") {
            inputType = "checkbox";
            placeholder = "";
          } else if (param.type.includes("string") || param.type === "str") {
            placeholder = "文本，如: example";
          }

          if (param.default) {
            placeholder += "，默认值: " + param.default;
          }

          // 为路径参数提供示例值
          let value = "";
          if (param.in === "path") {
            if (param.type === "int" || param.type === "integer") {
              value = "123";
            } else {
              value = "example";
            }
          }

          inputsHtml += `
                        <div class="input-group">
                            <label for="param-${routeId}-${param.name}">
                                ${param.name} (${param.type}) ${param.required ? '<span style="color:red">*</span>' : ""}
                            </label>
                            <input type="${inputType}" id="param-${routeId}-${param.name}" 
                                   value="${value}"
                                   placeholder="${placeholder}">
                        </div>
                    `;
        });

        return inputsHtml;
      }

      // 切换测试区域显示/隐藏
      function toggleTestSection(routeId) {
        const testSection = document.getElementById(`test-${routeId}`);
        if (testSection.style.display === "block") {
          testSection.style.display = "none";
        } else {
          testSection.style.display = "block";
          // 滚动到测试区域
          testSection.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
      }

      // 测试路由
      function testRoute(routeId, originalPath) {
        let url = originalPath;
        const params = {};

        // 收集参数值
        const routeElement = document.querySelector(`[data-path="${originalPath}"]`);
        if (!routeElement) {
          console.error("找不到路由元素:", originalPath);
          return;
        }

        // 获取当前路由的参数信息（从全局路由数据中查找）
        const routeInfo = window.routesData ? window.routesData.find((r) => r.path === originalPath) : null;

        if (routeInfo && routeInfo.parameters && routeInfo.parameters.length > 0) {
          routeInfo.parameters.forEach((param) => {
            const input = document.getElementById(`param-${routeId}-${param.name}`);
            if (input) {
              let value = input.type === "checkbox" ? input.checked : input.value;

              if (value) {
                if (param.in === "path") {
                  // 替换路径参数
                  url = url.replace(`{${param.name}}`, value);
                } else {
                  // 添加查询参数
                  params[param.name] = value;
                }
              } else if (param.required) {
                alert(`参数 ${param.name} 是必填的`);
                return;
              }
            }
          });
        }

        // 构建查询字符串
        const queryString = new URLSearchParams(params).toString();
        if (queryString) {
          url += "?" + queryString;
        }

        // 更新URL显示
        document.getElementById(`url-${routeId}`).value = url;

        // 发送请求
        const resultArea = document.getElementById(`result-${routeId}`);
        resultArea.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> 请求中...</p>';

        fetch(url)
          .then((response) => {
            const contentType = response.headers.get("content-type");

            // 如果响应不是OK，尝试获取错误信息
            if (!response.ok) {
              // 先尝试获取错误信息
              return response.text().then((errorText) => {
                let errorMessage = `HTTP错误: ${response.status} ${response.statusText}`;

                // 尝试从HTML错误页面提取有用信息
                if (errorText.includes("<title>")) {
                  const titleMatch = errorText.match(/<title>(.*?)<\/title>/i);
                  if (titleMatch) {
                    errorMessage += ` - ${titleMatch[1]}`;
                  }
                } else if (errorText.length < 500) {
                  // 如果不是HTML且内容不长，显示部分内容
                  errorMessage += ` - 响应: ${errorText.substring(0, 200)}...`;
                }

                throw new Error(errorMessage);
              });
            }

            // 正常响应，检查内容类型
            if (contentType && contentType.includes("application/json")) {
              return response.json();
            } else {
              return response.text().then((text) => {
                // 检查是否是HTML
                if (text.trim().startsWith("<!DOCTYPE") || text.includes("<html>") || text.includes("<html ")) {
                  // 如果是HTML，但状态码是200，可能是重定向到了登录页等
                  throw new Error(`服务器返回了HTML页面而不是预期的JSON数据。这可能是因为需要认证或路径不正确。`);
                }
                return { type: "text", content: text };
              });
            }
          })
          .then((data) => {
            if (data && data.type === "text") {
              resultArea.innerHTML = `
                <div>
                  <p><strong>服务器返回文本内容:</strong></p>
                  <pre>${data.content}</pre>
                </div>
              `;
            } else {
              resultArea.innerHTML = `
                <div>
                  <p><strong>请求成功!</strong></p>
                  <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>
              `;
            }
          })
          .catch((error) => {
            console.error("请求失败:", error);

            // 提供更友好的错误信息
            let userFriendlyMessage = error.message;
            if (error.message.includes("Failed to fetch")) {
              userFriendlyMessage = "无法连接到服务器。请检查URL是否正确且服务器正在运行。";
            } else if (error.message.includes("CORS")) {
              userFriendlyMessage = "跨域请求被阻止。这可能是由于CORS策略限制。";
            }

            resultArea.innerHTML = `
              <div style="color:red">
                <p><i class="fas fa-exclamation-triangle"></i> <strong>请求失败:</strong> ${userFriendlyMessage}</p>
                <details style="margin-top:10px;">
                  <summary>技术详情</summary>
                  <pre style="background:#f5f5f5;padding:10px;border-radius:4px;margin-top:5px;">${error.message}</pre>
                </details>
                <p style="margin-top:10px;font-size:0.9em;">
                  <i class="fas fa-lightbulb"></i> 提示: 确保请求的URL正确且API端点存在。
                </p>
              </div>
            `;
          });
      }

      // 保存路由数据到全局变量，便于后续使用
      fetch("/explorer/routes")
        .then((response) => response.json())
        .then((data) => {
          window.routesData = data.routes;
        });
    </script>
  </body>
</html>
