<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大文件切片上传</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        font-family: "Orbitron", "Segoe UI", sans-serif;
        background: #0a0e17;
        min-height: 100%;
        height: auto;
        padding: 20px;
        margin: 0;
        box-sizing: border-box;
        color: #e0e6ed;
        position: relative;
      }
      /* 科技感网格背景 */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      /* 渐变光晕 - 静态 */
      body::after {
        content: "";
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at 30% 30%, rgba(0, 212, 255, 0.08) 0%, transparent 50%), radial-gradient(circle at 70% 70%, rgba(123, 66, 246, 0.08) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
        opacity: 0.8;
        will-change: auto;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
        width: 100%;
        padding: 0 15px;
        box-sizing: border-box;
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: start;
      }
      .card {
        background: rgba(15, 23, 42, 0.9);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(0, 212, 255, 0.2);
        width: 100%;
        max-width: 100%;
        position: relative;
        overflow: hidden;
      }
      .card-full {
        grid-column: 1 / -1;
      }
      .left-column {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .right-column {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .right-column .card {
        height: fit-content;
        max-height: calc(100vh - 200px);
      }
      .right-column .file-list {
        max-height: calc(100vh - 350px);
        overflow-y: auto;
      }
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, #00d4ff, transparent);
      }
      h1 {
        color: #00d4ff;
        margin-bottom: 8px;
        font-size: 20px;
        text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        letter-spacing: 2px;
      }
      h3 {
        color: #00d4ff;
        text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        letter-spacing: 1px;
      }
      .subtitle {
        color: #7b8a9a;
        margin-bottom: 15px;
        font-size: 13px;
      }
      .upload-area {
        border: 2px dashed rgba(0, 212, 255, 0.4);
        border-radius: 12px;
        padding: 50px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        background: rgba(0, 212, 255, 0.03);
        position: relative;
      }
      .upload-area:hover,
      .upload-area.dragover {
        border-color: #00d4ff;
        background: rgba(0, 212, 255, 0.1);
        box-shadow:
          0 0 30px rgba(0, 212, 255, 0.2),
          inset 0 0 30px rgba(0, 212, 255, 0.05);
      }
      .upload-area .icon {
        font-size: 48px;
        margin-bottom: 15px;
        filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5));
      }
      .upload-area p {
        color: #7b8a9a;
        font-size: 14px;
      }
      .upload-area input {
        display: none;
      }
      .file-info {
        background: rgba(0, 212, 255, 0.05);
        border-radius: 8px;
        padding: 15px;
        margin-top: 15px;
        display: none;
        border: 1px solid rgba(0, 212, 255, 0.15);
      }
      .file-info.show {
        display: block;
      }
      .file-info .row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        align-items: center;
      }
      .file-info .row:last-child {
        margin-bottom: 0;
      }
      .file-info .label {
        color: #7b8a9a;
        font-size: 13px;
      }
      .file-info .value {
        color: #00d4ff;
        font-weight: 500;
        word-break: break-all;
        max-width: 60%;
        text-align: right;
        font-size: 13px;
      }
      .progress-container {
        margin-top: 15px;
        display: none;
      }
      .progress-container.show {
        display: block;
      }
      .progress-bar {
        height: 20px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(0, 212, 255, 0.3);
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #00d4ff 0%, #7b42f6 100%);
        border-radius: 10px;
        transition: width 0.2s ease;
        box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
      }
      .progress-text {
        top: -1px;
        z-index: 99999;
        position: absolute;
        width: 100%;
        height: 100px;
        text-align: center;
        color: red;
        font-weight: 900;
        font-size: 20px;
        line-height: 20px;
        text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
      }
      .status-log {
        background: rgba(0, 0, 0, 0.5);
        color: #00ff88;
        border-radius: 8px;
        padding: 12px;
        margin-top: 15px;
        max-height: 180px;
        overflow-y: auto;
        font-family: "Courier New", monospace;
        font-size: 12px;
        border: 1px solid rgba(0, 255, 136, 0.2);
      }
      .status-log .log-item {
        margin-bottom: 4px;
        padding: 2px 0;
      }
      .status-log .log-item.error {
        color: #ff4757;
        text-shadow: 0 0 5px rgba(255, 71, 87, 0.5);
      }
      .status-log .log-item.success {
        color: #00ff88;
        text-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
      }
      .status-log .log-item.warn {
        color: #ffd93d;
        text-shadow: 0 0 5px rgba(255, 217, 61, 0.5);
      }
      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 15px;
        flex-wrap: wrap;
      }
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        transition: all 0.3s ease;
        font-family: inherit;
        letter-spacing: 1px;
      }
      .btn-primary {
        background: linear-gradient(135deg, #00d4ff 0%, #7b42f6 100%);
        color: white;
        border: 1px solid rgba(0, 212, 255, 0.5);
      }
      .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 5px 25px rgba(0, 212, 255, 0.4);
      }
      .btn-primary:disabled {
        background: rgba(50, 50, 50, 0.5);
        cursor: not-allowed;
        border-color: rgba(100, 100, 100, 0.3);
        color: #666;
      }
      .btn-danger {
        background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
        color: white;
        border: 1px solid rgba(255, 71, 87, 0.5);
      }
      .btn-danger:hover {
        box-shadow: 0 5px 25px rgba(255, 71, 87, 0.4);
      }
      .btn-secondary {
        background: rgba(0, 212, 255, 0.1);
        color: #00d4ff;
        border: 1px solid rgba(0, 212, 255, 0.3);
      }
      .btn-secondary:hover {
        background: rgba(0, 212, 255, 0.2);
        box-shadow: 0 5px 25px rgba(0, 212, 255, 0.2);
      }
      .config-panel {
        background: rgba(0, 212, 255, 0.05);
        border-radius: 8px;
        padding: 15px;
        margin-top: 10px;
        border: 1px solid rgba(0, 212, 255, 0.15);
      }
      .config-row {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
      }
      .config-row:last-child {
        margin-bottom: 0;
      }
      .config-row label {
        width: 80px;
        color: #7b8a9a;
        font-size: 13px;
      }
      .config-row input,
      .config-row select {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 6px;
        font-size: 13px;
        background: rgba(0, 0, 0, 0.3);
        color: #e0e6ed;
        font-family: inherit;
      }
      .config-row select:focus,
      .config-row input:focus {
        outline: none;
        border-color: #00d4ff;
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
      }
      .config-row select option {
        background: #1a1a2e;
        color: #e0e6ed;
      }
      .file-list {
        margin-top: 15px;
        overflow-x: auto;
      }
      .file-list table {
        width: 100%;
        border-collapse: collapse;
      }
      .file-list th,
      .file-list td {
        padding: 10px;
        text-align: left;
        border-bottom: 1px solid rgba(0, 212, 255, 0.15);
        word-break: break-all;
        max-width: 250px;
        font-size: 13px;
      }
      .file-list th {
        background: rgba(0, 212, 255, 0.1);
        font-weight: 600;
        color: #00d4ff;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 11px;
      }
      .file-list tr:hover {
        background: rgba(0, 212, 255, 0.05);
      }
      .file-list td {
        color: #b0b8c4;
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .badge-success {
        background: rgba(0, 255, 136, 0.15);
        color: #00ff88;
        border: 1px solid rgba(0, 255, 136, 0.3);
      }
      .badge-info {
        background: rgba(0, 212, 255, 0.15);
        color: #00d4ff;
        border: 1px solid rgba(0, 212, 255, 0.3);
      }
      .system-info {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 12px;
      }
      .info-item {
        background: rgba(0, 212, 255, 0.05);
        padding: 10px 15px;
        border-radius: 8px;
        border: 1px solid rgba(0, 212, 255, 0.15);
        flex: 1;
        min-width: 150px;
      }
      .info-item .label {
        color: #7b8a9a;
        font-size: 11px;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .info-item .value {
        color: #00d4ff;
        font-weight: 500;
        font-size: 12px;
        word-break: break-all;
      }
      .chunk-progress {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        margin-top: 12px;
        max-height: 120px;
        overflow-y: auto;
        padding: 5px;
      }
      .chunk-item {
        width: 16px;
        height: 16px;
        border-radius: 3px;
        background: rgba(50, 50, 50, 0.5);
        border: 1px solid rgba(0, 212, 255, 0.2);
        transition: all 0.3s ease;
      }
      .chunk-item.uploaded {
        background: #00ff88;
        box-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
        border-color: #00ff88;
      }
      .chunk-item.current {
        background: #00d4ff;
        box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
        border-color: #00d4ff;
      }
      /* 滚动条美化 */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 212, 255, 0.3);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 212, 255, 0.5);
      }
      /* 响应式布局 */
      @media (max-width: 900px) {
        .container {
          grid-template-columns: 1fr;
        }
        .card-full {
          grid-column: 1;
        }
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <!-- 顶部标题栏 -->
      <div class="card card-full">
        <h1>⚡ 大文件切片上传系统</h1>
        <p class="subtitle">// 断网续传 · 文件秒传 · 自动合并</p>
        <!-- 系统信息 -->
        <div id="systemInfo" class="system-info"></div>
      </div>

      <!-- 左侧列 -->
      <div class="left-column">
        <div class="card">
          <h3 style="margin-bottom: 12px">⚙ 系统配置</h3>
          <div class="config-panel">
            <div class="config-row">
              <label>切片大小:</label>
              <select id="chunkSize">
                <option value="1048576">1 MB</option>
                <option value="5242880">5 MB</option>
                <option value="10485760" selected>10 MB</option>
                <option value="52428800">50 MB</option>
              </select>
            </div>
            <div class="config-row">
              <label>并发数:</label>
              <select id="concurrency">
                <option value="1">1 个</option>
                <option value="3" selected>3 个</option>
                <option value="5">5 个</option>
                <option value="10">10 个</option>
              </select>
            </div>
            <div class="config-row">
              <label>保存目录:</label>
              <select id="targetDir">
                <option value="">默认 (static/target)</option>
                <option value="json">json/</option>
                <option value="static">static/</option>
                <option value="templates">templates/</option>
              </select>
            </div>
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom: 12px">📂 文件选择</h3>
          <div class="upload-area" id="uploadArea">
            <div class="icon">⚡</div>
            <p>点击或拖拽文件到此处</p>
            <p style="font-size: 11px; color: #7b8a9a; margin-top: 8px">支持任意大小文件 · 切片并行上传</p>
            <input type="file" id="fileInput" />
          </div>

          <div class="file-info" id="fileInfo">
            <div class="row">
              <span class="label">文件名:</span>
              <span class="value" id="fileName"></span>
            </div>
            <div class="row">
              <span class="label">文件大小:</span>
              <span class="value" id="fileSize"></span>
            </div>
            <div class="row">
              <span class="label">文件MD5:</span>
              <span class="value" id="fileMd5">计算中...</span>
            </div>
            <div class="row">
              <span class="label">切片数量:</span>
              <span class="value" id="chunkCount"></span>
            </div>
          </div>

          <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
              <div class="progress-text" id="progressText">0%</div>
            </div>
            <div class="chunk-progress" id="chunkProgress"></div>
          </div>

          <div class="btn-group">
            <button class="btn btn-primary" id="uploadBtn" disabled>▶ 启动上传</button>
            <button class="btn btn-danger" id="cancelBtn" style="display: none">■ 终止任务</button>
            <button class="btn btn-secondary" id="checkBtn" style="display: none">⟳ 断点检测</button>
          </div>

          <div class="status-log" id="statusLog"></div>
        </div>
      </div>

      <!-- 右侧列 -->
      <div class="right-column">
        <div class="card">
          <h3 style="margin-bottom: 12px">📋 上传记录</h3>
          <button class="btn btn-secondary" id="refreshListBtn">⟳ 刷新</button>
          <div class="file-list" id="fileList"></div>
        </div>
      </div>
    </div>

    <script>
      // 状态管理
      const state = {
        file: null,
        fileId: null,
        fileMd5: null,
        totalChunks: 0,
        uploadedChunks: new Set(),
        uploading: false,
        xhrQueue: [],
        logCount: 0,
        lastLogTime: 0,
      };

      // DOM 元素
      const elements = {
        uploadArea: document.getElementById("uploadArea"),
        fileInput: document.getElementById("fileInput"),
        fileInfo: document.getElementById("fileInfo"),
        fileName: document.getElementById("fileName"),
        fileSize: document.getElementById("fileSize"),
        fileMd5: document.getElementById("fileMd5"),
        chunkCount: document.getElementById("chunkCount"),
        progressContainer: document.getElementById("progressContainer"),
        progressFill: document.getElementById("progressFill"),
        progressText: document.getElementById("progressText"),
        chunkProgress: document.getElementById("chunkProgress"),
        uploadBtn: document.getElementById("uploadBtn"),
        cancelBtn: document.getElementById("cancelBtn"),
        checkBtn: document.getElementById("checkBtn"),
        statusLog: document.getElementById("statusLog"),
        fileList: document.getElementById("fileList"),
        systemInfo: document.getElementById("systemInfo"),
        chunkSize: document.getElementById("chunkSize"),
        concurrency: document.getElementById("concurrency"),
        targetDir: document.getElementById("targetDir"),
        refreshListBtn: document.getElementById("refreshListBtn"),
      };

      // 工具函数
      function formatSize(bytes) {
        if (bytes === 0) return "0 B";
        const k = 1024;
        const sizes = ["B", "KB", "MB", "GB", "TB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
      }

      function log(message, type = "info") {
        // 限制日志频率，避免过多DOM操作
        const now = Date.now();
        if (type === "info" && now - state.lastLogTime < 100 && state.logCount > 50) {
          return;
        }
        state.lastLogTime = now;
        state.logCount++;

        // 限制日志数量
        if (elements.statusLog.children.length > 100) {
          elements.statusLog.removeChild(elements.statusLog.firstChild);
        }

        const item = document.createElement("div");
        item.className = `log-item ${type}`;
        item.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        elements.statusLog.appendChild(item);
        elements.statusLog.scrollTop = elements.statusLog.scrollHeight;
      }

      // 使用requestAnimationFrame优化进度更新
      let progressUpdateScheduled = false;
      function updateProgress(uploaded, total) {
        if (progressUpdateScheduled) return;
        progressUpdateScheduled = true;

        requestAnimationFrame(() => {
          const percent = total > 0 ? ((uploaded / total) * 100).toFixed(1) : 0;
          elements.progressFill.style.width = percent + "%";
          elements.progressText.textContent = `${percent}% (${uploaded}/${total})`;
          progressUpdateScheduled = false;
        });
      }

      // 优化切片进度渲染 - 限制最大显示数量
      function renderChunkProgress(total, uploaded) {
        // 切片数过多时只显示前200个
        const maxDisplay = 200;
        const displayTotal = Math.min(total, maxDisplay);

        if (elements.chunkProgress.children.length !== displayTotal) {
          elements.chunkProgress.innerHTML = "";
          for (let i = 0; i < displayTotal; i++) {
            const item = document.createElement("div");
            item.className = "chunk-item";
            item.dataset.index = i;
            elements.chunkProgress.appendChild(item);
          }
          if (total > maxDisplay) {
            const hint = document.createElement("span");
            hint.style.cssText = "color: #7b8a9a; font-size: 11px; margin-left: 10px;";
            hint.textContent = `+${total - maxDisplay}`;
            elements.chunkProgress.appendChild(hint);
          }
        }

        // 更新状态
        const items = elements.chunkProgress.querySelectorAll(".chunk-item");
        items.forEach((item, i) => {
          if (uploaded.has(i)) {
            item.classList.add("uploaded");
          } else {
            item.classList.remove("uploaded");
          }
        });
      }

      // 计算文件MD5 - 分片计算避免阻塞UI
      async function calculateMd5(file) {
        return new Promise((resolve, reject) => {
          const chunkSize = 2 * 1024 * 1024; // 2MB chunks
          const chunks = Math.ceil(file.size / chunkSize);
          let currentChunk = 0;
          const spark = new SparkMD5.ArrayBuffer();

          function loadNext() {
            const start = currentChunk * chunkSize;
            const end = Math.min(start + chunkSize, file.size);
            const reader = new FileReader();

            reader.onload = (e) => {
              spark.append(e.target.result);
              currentChunk++;

              // 每处理完一个分片，给UI线程喘息机会
              if (currentChunk < chunks && currentChunk < 5) {
                // 最多处理5个分片(10MB)
                setTimeout(loadNext, 0);
              } else {
                resolve(spark.end());
              }
            };

            reader.onerror = reject;
            reader.readAsArrayBuffer(file.slice(start, end));
          }

          loadNext();
        });
      }

      // 初始化上传
      async function initUpload() {
        const chunkSize = parseInt(elements.chunkSize.value);
        const totalChunks = Math.ceil(state.file.size / chunkSize);
        state.totalChunks = totalChunks;
        state.fileId = await calculateMd5(state.file);

        elements.chunkCount.textContent = totalChunks;
        elements.fileMd5.textContent = state.fileId;

        log(`[INIT] 初始化上传: ${state.file.name}, 切片数: ${totalChunks}`);

        try {
          const targetDir = elements.targetDir.value;
          const response = await fetch("/upload/init", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams({
              fileId: state.fileId,
              filename: state.file.name,
              fileSize: state.file.size,
              totalChunks: totalChunks,
              fileMd5: state.fileId,
              targetDir: targetDir,
            }),
          });

          const result = await response.json();

          if (result.code === 200) {
            if (result.data && result.data.instant) {
              // 秒传
              log("[INSTANT] 秒传成功! 文件已存在", "success");
              updateProgress(totalChunks, totalChunks);
              renderChunkProgress(totalChunks, new Set([...Array(totalChunks).keys()]));
              state.uploadedChunks = new Set([...Array(totalChunks).keys()]);
              elements.uploadBtn.disabled = true;
              elements.cancelBtn.style.display = "none";
              refreshFileList();
              return;
            }
            log("[READY] 初始化完成", "success");
            elements.uploadBtn.disabled = false;

            // 检查是否有断点续传
            checkResume();
          } else {
            log("[ERROR] 初始化失败: " + result.msg, "error");
          }
        } catch (error) {
          log("[ERROR] 初始化错误: " + error.message, "error");
        }
      }

      // 检查断点续传
      async function checkResume() {
        try {
          const response = await fetch(`/upload/check/${state.fileId}`);
          const result = await response.json();

          if (result.code === 200 && result.data && result.data.uploadedChunks) {
            const uploaded = new Set(result.data.uploadedChunks);
            if (uploaded.size > 0) {
              state.uploadedChunks = uploaded;
              log(`[RESUME] 发现断点数据: ${uploaded.size}/${state.totalChunks} 切片已上传`, "warn");
              updateProgress(uploaded.size, state.totalChunks);
              renderChunkProgress(state.totalChunks, uploaded);
              elements.checkBtn.style.display = "inline-block";
            }
          }
        } catch (error) {
          console.error("检查断点失败:", error);
        }
      }

      // 上传切片
      function uploadChunk(chunkIndex) {
        return new Promise((resolve, reject) => {
          const chunkSize = parseInt(elements.chunkSize.value);
          const start = chunkIndex * chunkSize;
          const end = Math.min(start + chunkSize, state.file.size);
          const chunk = state.file.slice(start, end);

          const formData = new FormData();
          formData.append("fileId", state.fileId);
          formData.append("chunkIndex", chunkIndex);
          formData.append("chunk", chunk);

          const xhr = new XMLHttpRequest();
          state.xhrQueue.push(xhr);

          xhr.onload = () => {
            if (xhr.status === 200) {
              const result = JSON.parse(xhr.responseText);
              if (result.code === 200) {
                state.uploadedChunks.add(chunkIndex);
                updateProgress(state.uploadedChunks.size, state.totalChunks);
                renderChunkProgress(state.totalChunks, state.uploadedChunks);
                resolve(result);
              } else {
                reject(new Error(result.msg));
              }
            } else {
              reject(new Error("上传失败"));
            }
          };

          xhr.onerror = () => reject(new Error("网络错误"));
          xhr.onabort = () => reject(new Error("已取消"));

          xhr.open("POST", "/upload/chunk");
          xhr.send(formData);
        });
      }

      // 开始上传
      async function startUpload() {
        state.uploading = true;
        elements.uploadBtn.disabled = true;
        elements.cancelBtn.style.display = "inline-block";
        elements.progressContainer.classList.add("show");

        const concurrency = parseInt(elements.concurrency.value);
        const pendingChunks = [];

        for (let i = 0; i < state.totalChunks; i++) {
          if (!state.uploadedChunks.has(i)) {
            pendingChunks.push(i);
          }
        }

        log(`[START] 上传任务启动 | 并发: ${concurrency} | 待上传: ${pendingChunks.length} 切片`);

        // 并发上传
        const uploadQueue = async () => {
          while (pendingChunks.length > 0 && state.uploading) {
            const batch = pendingChunks.splice(0, concurrency);
            const tasks = batch.map((idx) =>
              uploadChunk(idx)
                .then(() => log(`[CHUNK] 切片 ${idx + 1}/${state.totalChunks} 上传完成`))
                .catch((err) => {
                  log(`[RETRY] 切片 ${idx + 1} 上传失败: ${err.message}`, "error");
                  pendingChunks.push(idx); // 重新加入队列
                }),
            );
            await Promise.all(tasks);
          }
        };

        try {
          await uploadQueue();

          if (state.uploading && state.uploadedChunks.size === state.totalChunks) {
            log("[MERGE] 所有切片上传完成, 开始合并...");
            await mergeChunks();
          } else if (!state.uploading) {
            log("[CANCEL] 上传任务已终止", "warn");
          }
        } catch (error) {
          log("[ERROR] 上传错误: " + error.message, "error");
        }

        state.uploading = false;
        elements.cancelBtn.style.display = "none";
      }

      // 合并切片
      async function mergeChunks() {
        try {
          const response = await fetch("/upload/merge", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams({ fileId: state.fileId }),
          });

          const result = await response.json();

          if (result.code === 200) {
            log(`[SUCCESS] 文件合并完成!`, "success");
            log(`[INFO] 路径: ${result.data.path}`, "success");
            refreshFileList();
          } else {
            log("[ERROR] 合并失败: " + result.msg, "error");
          }
        } catch (error) {
          log("[ERROR] 合并错误: " + error.message, "error");
        }
      }

      // 取消上传
      function cancelUpload() {
        state.uploading = false;
        state.xhrQueue.forEach((xhr) => xhr.abort());
        state.xhrQueue = [];
        log("[ABORT] 正在终止上传任务...", "warn");
      }

      // 刷新文件列表
      async function refreshFileList() {
        try {
          const response = await fetch("/upload/files");
          const result = await response.json();

          if (result.code === 200) {
            const files = result.data.files || [];
            if (files.length === 0) {
              elements.fileList.innerHTML = '<p style="color: #999; padding: 20px;">暂无文件</p>';
            } else {
              elements.fileList.innerHTML = `
                            <table>
                                <thead>
                                    <tr>
                                        <th>文件名</th>
                                        <th>大小</th>
                                        <th>修改时间</th>
                                        <th>状态</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${files
                                      .map(
                                        (f) => `
                                        <tr>
                                            <td>${f.name}</td>
                                            <td>${formatSize(f.size)}</td>
                                            <td>${new Date(f.modified).toLocaleString()}</td>
                                            <td><span class="badge badge-success">已完成</span></td>
                                        </tr>
                                    `,
                                      )
                                      .join("")}
                                </tbody>
                            </table>
                        `;
            }
          }
        } catch (error) {
          console.error("获取文件列表失败:", error);
        }
      }

      // 加载系统信息
      async function loadSystemInfo() {
        try {
          const response = await fetch("/upload/info");
          const result = await response.json();

          if (result.code === 200) {
            const data = result.data;
            elements.systemInfo.innerHTML = `
                        <div class="info-item">
                            <div class="label">操作系统</div>
                            <div class="value">${data.osName} ${data.osVersion}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">保存路径</div>
                            <div class="value">${data.targetDirectory}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">运行目录</div>
                            <div class="value">${data.userDir}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">系统类型</div>
                            <div class="value">${data.isLinux ? "Linux 服务器" : "开发环境"}</div>
                        </div>
                    `;
          }
        } catch (error) {
          console.error("获取系统信息失败:", error);
        }
      }

      // 事件绑定
      elements.uploadArea.addEventListener("click", () => elements.fileInput.click());
      elements.uploadArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        elements.uploadArea.classList.add("dragover");
      });
      elements.uploadArea.addEventListener("dragleave", () => {
        elements.uploadArea.classList.remove("dragover");
      });
      elements.uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        elements.uploadArea.classList.remove("dragover");
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          handleFileSelect(files[0]);
        }
      });

      elements.fileInput.addEventListener("change", (e) => {
        if (e.target.files.length > 0) {
          handleFileSelect(e.target.files[0]);
        }
      });

      function handleFileSelect(file) {
        state.file = file;
        state.uploadedChunks = new Set();
        state.logCount = 0;
        state.lastLogTime = 0;

        elements.fileInfo.classList.add("show");
        elements.fileName.textContent = file.name;
        elements.fileSize.textContent = formatSize(file.size);
        elements.fileMd5.textContent = "计算中...";
        elements.progressContainer.classList.remove("show");
        elements.uploadBtn.disabled = true;
        elements.statusLog.innerHTML = "";

        log(`[SELECT] 文件: ${file.name} | 大小: ${formatSize(file.size)}`);
        initUpload();
      }

      elements.uploadBtn.addEventListener("click", startUpload);
      elements.cancelBtn.addEventListener("click", cancelUpload);
      elements.refreshListBtn.addEventListener("click", refreshFileList);

      // 初始化
      loadSystemInfo();
      refreshFileList();

      // 确保页面滚动到顶部
      window.scrollTo(0, 0);

      // 加载SparkMD5库
      const script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/npm/spark-md5@3.0.2/spark-md5.min.js";
      document.head.appendChild(script);
    </script>
  </body>
</html>
