<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>图片水印添加工具</title>
    <link rel="shortcut icon" href="/static/elevator.jpg" type="image/x-icon" />
    <link data-type="index" href="/static/upload/index.css" rel="stylesheet" />
    <link data-type="bootstrap" href="/static/upload/css/bootstrap-icons.min.css" rel="stylesheet" />
    <link data-type="weather" href="/static/css/weather.css" rel="stylesheet" />
    <link data-type="weather" href="/static/css/tableRows.css" rel="stylesheet" />
    <link data-type="PseudoSelectors" href="/static/css/PseudoSelectors.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/upload/css/searchCss.css" />
    <link rel="stylesheet" href="/static/ehs/css/all.min.css" />
    <link rel="stylesheet" href="/static/ehs/css/index.css" />
    <script src="/static/upload/js/attributeVerification.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script src="/static/upload/vue.js"></script>
    <script src="/static/upload/index.js"></script>
    <script src="/static/upload/axios.min.js"></script>
    <script src="/static/js/jquery.min.js" type="text/javascript"></script>
    <script src="/static/js/js/jsbridge-mini.js" type="text/javascript"></script>
    <script src="/static/fake-progress/index.js"></script>
    <script src="/static/upload/eruda.min.js"></script>
    <script src="/static/api/qrcode.min.js"></script>
    <script src="/static/js/cdn_index.js" type="text/javascript"></script>
    <script src="/static/js/unpkg_index.js" type="text/javascript"></script>
    <script src="/static/video/js/pageStatus.js"></script>
    <script src="/static/upload/js/dragAndDrop.js" type="text/javascript"></script>
  </head>
  <style>
    .wm-container {
      max-width: 1100px;
      margin: 16px auto;
      padding: 16px;
    }
    .wm-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      padding: 16px;
    }
    .wm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }
    .wm-title {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .wm-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .wm-input {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 6px 10px;
    }
    .wm-input input[type="date"],
    .wm-input input[type="text"] {
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: #111827;
    }
    .wm-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #3b82f6;
      color: #fff;
      font-size: 14px;
    }
    .wm-btn.secondary {
      background: #10b981;
    }
    .wm-btn.warning {
      background: #f59e0b;
    }
    .wm-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .wm-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .wm-pane {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
    }
    .wm-pane-header {
      padding: 10px 12px;
      background: #f3f4f6;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #374151;
      font-size: 14px;
    }
    .wm-pane-body {
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: repeating-conic-gradient(#fafafa 0% 25%, #f6f6f6 0% 50%) 50% / 20px 20px;
    }
    .wm-preview {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .wm-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    @media (max-width: 900px) {
      .wm-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <body>
    <div id="app" class="wm-container">
      <div class="wm-card">
        <div class="wm-header">
          <div class="wm-title">
            <i class="fas fa-water"></i>
            图片水印添加工具
          </div>
          <div class="wm-controls">
            <label class="wm-input">
              <i class="fas fa-calendar"></i>
              <input type="date" v-model="wmDate" @change="syncDateTimeFromDate" />
            </label>
            <label class="wm-input">
              <i class="fas fa-location-dot"></i>
              <input type="text" v-model="lat" placeholder="纬度 如 31.263788" @input="debouncedRedraw" />
            </label>
            <label class="wm-input">
              <i class="fas fa-location-crosshairs"></i>
              <input type="text" v-model="lng" placeholder="经度 如 120.731493" @input="debouncedRedraw" />
            </label>
            <label class="wm-input">
              <i class="fas fa-clock"></i>
              <input type="text" v-model="wmDateTime" placeholder="YYYY-MM-DD HH:mm:ss" @input="debouncedRedraw" />
            </label>
            <label class="wm-input" style="cursor: pointer">
              <i class="fas fa-image"></i>
              <input type="file" accept="image/*" @change="onFileChange" style="display: none" ref="fileInput" />
              <button class="wm-btn" type="button" @click="$refs.fileInput.click()">选择图片</button>
            </label>
          </div>
        </div>

        <div class="wm-grid">
          <div class="wm-pane">
            <div class="wm-pane-header">
              <span><i class="fas fa-image"></i> 原图预览</span>
              <span v-if="origName">[[ origName ]] ([[ imageNaturalWidth ]]×[[ imageNaturalHeight ]])</span>
            </div>
            <div class="wm-pane-body">
              <img v-if="origSrc" :src="origSrc" class="wm-preview" alt="原图" />
              <div v-else>请先选择图片</div>
            </div>
          </div>
          <div class="wm-pane">
            <div class="wm-pane-header">
              <span><i class="fas fa-copyright"></i> 水印预览</span>
              <span v-if="wmReady">PNG，含透明水印</span>
            </div>
            <div class="wm-pane-body">
              <img v-if="wmSrc" :src="wmSrc" class="wm-preview" alt="水印图" />
              <div v-else>水印生成后在此预览</div>
            </div>
          </div>
        </div>

        <div class="wm-footer">
          <button class="wm-btn secondary" type="button" :disabled="!origSrc" @click="redrawWatermark">
            <i class="fas fa-sync-alt"></i>
            重新生成
          </button>
          <button class="wm-btn warning" type="button" :disabled="!wmSrc" @click="downloadWatermarked">
            <i class="fas fa-download"></i>
            下载水印图
          </button>
        </div>
      </div>

      <canvas ref="canvas" style="display: none"></canvas>
    </div>
    <script>
      new Vue({
        el: "#app",
        delimiters: ["[[", "]]"],
        data: {
          wmDate: "",
          wmDateTime: "",
          lat: "31.263788",
          lng: "120.731493",
          origFile: null,
          origName: "",
          origSrc: "",
          wmSrc: "",
          wmReady: false,
          imageNaturalWidth: 0,
          imageNaturalHeight: 0,
          debounceTimer: null,
          lineGapRatio: 0.5, // 行间距相对于字体大小
          bottomPaddingRatio: 1.2, // 底部内边距相对于字体大小
          geoTimer: null, // 定时更新经纬度
          dateTimer: null, // 每3分钟更新日期时间
        },
        mounted() {
          const now = new Date();
          const y = now.getFullYear();
          const m = String(now.getMonth() + 1).padStart(2, "0");
          const d = String(now.getDate()).padStart(2, "0");
          const hh = String(now.getHours()).padStart(2, "0");
          const mm = String(now.getMinutes()).padStart(2, "0");
          const ss = String(now.getSeconds()).padStart(2, "0");
          this.wmDate = `${y}-${m}-${d}`;
          this.wmDateTime = `${y}-${m}-${d} ${hh}:${mm}:${ss}`;

          // 每 3 分钟更新一次日期时间
          this.dateTimer = setInterval(() => {
            const now2 = new Date();
            const y2 = now2.getFullYear();
            const m2 = String(now2.getMonth() + 1).padStart(2, "0");
            const d2 = String(now2.getDate()).padStart(2, "0");
            const hh2 = String(now2.getHours()).padStart(2, "0");
            const mm2 = String(now2.getMinutes()).padStart(2, "0");
            const ss2 = String(now2.getSeconds()).padStart(2, "0");
            this.wmDate = `${y2}-${m2}-${d2}`;
            this.wmDateTime = `${y2}-${m2}-${d2} ${hh2}:${mm2}:${ss2}`;
            this.debouncedRedraw();
          }, 180000);

          // 每 5 秒更新一次经纬度
          this.geoTimer = setInterval(() => {
            this.updateGeo();
            this.debouncedRedraw();
          }, 5000);
        },
        beforeDestroy() {
          if (this.geoTimer) {
            clearInterval(this.geoTimer);
            this.geoTimer = null;
          }
          if (this.dateTimer) {
            clearInterval(this.dateTimer);
            this.dateTimer = null;
          }
        },
        methods: {
          randomInRange(min, max, decimals = 6) {
            const n = Math.random() * (max - min) + min;
            return n.toFixed(decimals);
          },
          updateGeo() {
            // 纬度 31.260001 - 31.269999
            this.lat = this.randomInRange(31.260001, 31.269999, 6);
            // 经度 120.700001 - 120.799999
            this.lng = this.randomInRange(120.700001, 120.799999, 6);
          },
          syncDateTimeFromDate() {
            // 当选择日期时，若已有时间，保留时间；否则默认 10:12:23
            const timePart = this.wmDateTime.split(" ")[1] || "10:12:23";
            this.wmDateTime = `${this.wmDate} ${timePart}`;
            this.debouncedRedraw();
          },
          onFileChange(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith("image/")) {
              alert("请选择图片文件");
              return;
            }
            this.origFile = file;
            this.origName = file.name;
            const reader = new FileReader();
            reader.onload = (evt) => {
              this.origSrc = evt.target.result;
              this.$nextTick(() => this.redrawWatermark());
            };
            reader.readAsDataURL(file);
          },
          debouncedRedraw() {
            clearTimeout(this.debounceTimer);
            this.debounceTimer = setTimeout(() => this.redrawWatermark(), 200);
          },
          weekdayCN(dateStr) {
            const map = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            const dt = new Date(dateStr.replace(/-/g, "/"));
            return map[dt.getDay()] || "";
          },
          redrawWatermark() {
            if (!this.origSrc) return;
            const img = new Image();
            img.onload = () => {
              this.imageNaturalWidth = img.naturalWidth;
              this.imageNaturalHeight = img.naturalHeight;
              const canvas = this.$refs.canvas;
              const ctx = canvas.getContext("2d");
              canvas.width = img.naturalWidth;
              canvas.height = img.naturalHeight;

              // 绘制原图
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

              // 两行文本
              const line1 = `纬度:${this.lat} 经度:${this.lng}`;
              const weekday = this.weekdayCN(this.wmDateTime.split(" ")[0]);
              const line2 = `${this.wmDateTime} ${weekday}`;

              // 字体与样式
              const baseSize = Math.max(canvas.width, canvas.height);
              const fontSize = Math.max(18, Math.floor(baseSize * 0.023));
              const lineGap = Math.floor(fontSize * this.lineGapRatio);
              const bottomPadding = Math.floor(fontSize * this.bottomPaddingRatio);

              ctx.font = `${fontSize}px sans-serif`;
              ctx.textAlign = "left";
              ctx.textBaseline = "alphabetic";

              // 计算位置：中下（水平居中，靠近底部）
              const centerX = Math.floor(canvas.width / 2);
              const maxTextWidth = Math.max(ctx.measureText(line1).width, ctx.measureText(line2).width);
              const leftX = Math.floor(centerX - maxTextWidth / 2); // 以文本块为单位居中
              const adjustY = Math.floor(fontSize * 0.2); // 上下微调
              const bottomY = canvas.height - bottomPadding + adjustY; // 第二行基线，下移一点
              const firstLineY = bottomY - (lineGap + fontSize) - adjustY; // 第一行基线，上移一点

              // 文本颜色：白色，无底框
              ctx.fillStyle = "rgba(255,255,255,1)";
              ctx.fillText(line1, leftX, firstLineY);
              ctx.fillText(line2, leftX, bottomY);

              this.wmSrc = canvas.toDataURL("image/png");
              this.wmReady = true;
            };
            img.crossOrigin = "anonymous";
            img.src = this.origSrc;
          },
          downloadWatermarked() {
            if (!this.wmSrc) return;
            const a = document.createElement("a");
            const nameNoExt = this.origName ? this.origName.replace(/\.[^.]+$/, "") : "watermarked";
            a.href = this.wmSrc;
            a.download = `${nameNoExt}_wm.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          },
        },
      });
    </script>
  </body>
</html>
